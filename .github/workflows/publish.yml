name: Publish to crates.io

# Triggers when you push a tag like `v0.1.1` (matches the crate version).
# Manual runs are also allowed from the Actions tab via workflow_dispatch.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    name: cargo publish
    runs-on: ubuntu-latest
    # Hardening: only this job needs the token, and it doesn't need write
    # access to the repo itself.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-publish-${{ hashFiles('**/Cargo.lock') }}

      - name: Verify tag matches Cargo.toml version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          manifest_version="$(cargo metadata --no-deps --format-version 1 \
            | python3 -c 'import sys,json; print(json.load(sys.stdin)["packages"][0]["version"])')"
          echo "tag=$tag_version manifest=$manifest_version"
          if [ "$tag_version" != "$manifest_version" ]; then
            echo "::error::Tag v$tag_version does not match Cargo.toml version $manifest_version"
            exit 1
          fi

      - name: Publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked
